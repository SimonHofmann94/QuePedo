<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>¿Qué Pedo! — Design System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caprasimo&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    * { box-sizing: border-box; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="foundation.jsx"></script>
  <script type="text/babel" src="components-panel.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="foundation" title="01 · Foundation" subtitle="Brand, colors, type, motifs">
            <DCArtboard id="brand" label="Brand" width={1280} height={780}>
              <BrandPanel />
            </DCArtboard>
            <DCArtboard id="colors" label="Color palette" width={1280} height={1680}>
              <ColorPanel />
            </DCArtboard>
            <DCArtboard id="type" label="Typography" width={1280} height={1700}>
              <TypePanel />
            </DCArtboard>
            <DCArtboard id="motifs" label="Motifs & Icons" width={1280} height={1100}>
              <MotifsPanel />
            </DCArtboard>
          </DCSection>

          <DCSection id="components" title="02 · Components" subtitle="Buttons, forms, cards, badges, progress">
            <DCArtboard id="library" label="Component library" width={1280} height={1900}>
              <ComponentsPanel />
            </DCArtboard>
          </DCSection>

          <DCSection id="screens" title="03 · Redesigned screens" subtitle="All 7 app screens in the new system">
            <DCArtboard id="landing" label="Landing" width={1280} height={900}>
              <LandingScreen />
            </DCArtboard>
            <DCArtboard id="dashboard" label="Dashboard" width={1280} height={900}>
              <DashboardScreen />
            </DCArtboard>
            <DCArtboard id="vocab" label="Vocabulary" width={1280} height={900}>
              <VocabScreen />
            </DCArtboard>
            <DCArtboard id="grammar" label="Grammar" width={1280} height={900}>
              <GrammarScreen />
            </DCArtboard>
            <DCArtboard id="exercises" label="Exercises / Quiz" width={1280} height={900}>
              <ExercisesScreen />
            </DCArtboard>
            <DCArtboard id="culture" label="Culture Map" width={1280} height={900}>
              <CultureScreen />
            </DCArtboard>
            <DCArtboard id="profile" label="Profile" width={1280} height={900}>
              <ProfileScreen />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
